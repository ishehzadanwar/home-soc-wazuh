<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1712"/>
      <stop offset="1" stop-color="#100c08"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2c46b"/>
      <stop offset="1" stop-color="#d98f2b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e0a23b" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e0a23b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <circle cx="1010" cy="70" r="240" fill="url(#glow)"/>
  <circle cx="150" cy="300" r="200" fill="url(#glow)"/>

  <!-- faint scanlines for SOC feel -->
  <g stroke="#f6efe1" stroke-opacity="0.035">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- left accent bar -->
  <rect x="0" y="0" width="9" height="300" fill="url(#amber)"/>

  <!-- shield emblem -->
  <g transform="translate(70,84)">
    <path d="M66 4 L120 24 L120 74 C120 116 96 140 66 152 C36 140 12 116 12 74 L12 24 Z"
          fill="none" stroke="url(#amber)" stroke-width="5"/>
    <path d="M42 74 L60 94 L96 52" fill="none" stroke="url(#amber)" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- title -->
  <text x="228" y="130" fill="#f6efe1" font-size="58" font-weight="700" letter-spacing="1.5">Home SOC with Wazuh</text>
  <rect x="230" y="150" width="150" height="4" rx="2" fill="url(#amber)"/>
  <text x="230" y="192" fill="#c9b79c" font-size="24" font-weight="400">Wazuh SIEM · Windows + Sysmon · MITRE ATT&amp;CK</text>
  <text x="230" y="224" fill="#8f8171" font-size="19" font-weight="400" letter-spacing="0.5">A home blue-team lab — collect · centralize · detect · investigate</text>

  <!-- chips -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="15">
    <g transform="translate(230,250)">
      <rect width="188" height="34" rx="17" fill="#241d16" stroke="#3a2f24"/>
      <circle cx="20" cy="17" r="5" fill="#6cc08b"/>
      <text x="36" y="22" fill="#d9c7ac">3 detections</text>
    </g>
    <g transform="translate(432,250)">
      <rect width="214" height="34" rx="17" fill="#241d16" stroke="#3a2f24"/>
      <circle cx="20" cy="17" r="5" fill="#e0a23b"/>
      <text x="36" y="22" fill="#d9c7ac">1 false-positive triage</text>
    </g>
    <g transform="translate(660,250)">
      <rect width="196" height="34" rx="17" fill="#241d16" stroke="#3a2f24"/>
      <circle cx="20" cy="17" r="5" fill="#5b9bd5"/>
      <text x="36" y="22" fill="#d9c7ac">Wazuh 4.14.6</text>
    </g>
  </g>
</svg>
